<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qantiv — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep: #073E43;
      --deep-2: #052F34;
      --deep-3: #082A2D;
      --cream: #F7F2E8;
      --muted: rgba(247, 242, 232, 0.72);
      --hairline: rgba(247, 242, 232, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.02) 28%, transparent 56%),
        linear-gradient(145deg, var(--deep) 0%, var(--deep-2) 48%, var(--deep-3) 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 68%);
      opacity: 0.42;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 18px;
      border: 1px solid rgba(247, 242, 232, 0.08);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 2;
      width: min(920px, calc(100vw - 40px));
      min-height: min(760px, calc(100vh - 40px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .mark-bg {
      position: absolute;
      width: min(560px, 68vw);
      opacity: 0.05;
      transform: translateY(-22px);
      filter: blur(0.2px);
      pointer-events: none;
      user-select: none;
    }

    .mark {
      width: clamp(138px, 18vw, 210px);
      height: auto;
      display: block;
      margin-bottom: 42px;
      filter: drop-shadow(0 30px 58px rgba(0, 0, 0, 0.20));
      opacity: 0.99;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.58);
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 38px;
      height: 1px;
      background: var(--hairline);
    }

    h1 {
      font-family: "Inter", sans-serif;
      font-size: clamp(2.95rem, 7vw, 5.35rem);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.055em;
      margin-bottom: 30px;
    }

    .headline {
      max-width: 680px;
      margin: 0 auto;
      font-size: clamp(1.08rem, 2vw, 1.34rem);
      line-height: 1.72;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: -0.015em;
    }

    .signature {
      margin-top: 36px;
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.62);
    }

    .signature span:not(:last-child)::after {
      content: "·";
      margin-left: 14px;
      color: rgba(247, 242, 232, 0.32);
    }

    .mail {
      position: fixed;
      z-index: 3;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      color: rgba(247, 242, 232, 0.62);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      transition: color 0.22s ease;
    }

    .mail::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 6px;
      background: rgba(247, 242, 232, 0.16);
      transform: scaleX(0.35);
      transition: transform 0.22s ease, background 0.22s ease;
    }

    .mail:hover { color: var(--cream); }

    .mail:hover::after {
      transform: scaleX(1);
      background: rgba(247, 242, 232, 0.44);
    }

    @media (max-width: 720px) {
      body::after { inset: 12px; }

      .shell {
        min-height: calc(100vh - 24px);
        padding: 64px 18px 96px;
      }

      .mark-bg {
        width: 92vw;
        opacity: 0.045;
      }

      .mark {
        width: 146px;
        margin-bottom: 34px;
      }

      .eyebrow {
        gap: 12px;
        font-size: 0.64rem;
        letter-spacing: 0.22em;
        margin-bottom: 22px;
      }

      .eyebrow::before,
      .eyebrow::after { width: 26px; }

      h1 {
        font-size: clamp(3rem, 15vw, 4.4rem);
        margin-bottom: 26px;
      }

      .headline {
        font-size: 1rem;
        line-height: 1.72;
        max-width: 340px;
      }

      .signature {
        margin-top: 30px;
        font-size: 0.64rem;
        letter-spacing: 0.14em;
        line-height: 1.8;
      }

      .mail {
        bottom: 28px;
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <img class="mark-bg" src="qantiv_icon_white_transparent.png" alt="" aria-hidden="true" />
    <img class="mark" src="qantiv_icon_white_transparent.png" alt="Qantiv symbol" />

    <div class="eyebrow">Coming soon</div>

    <h1>Qantiv</h1>

    <p class="headline">
      CFO-level clarity for ambitious businesses.
    </p>

    <div class="signature" aria-label="Qantiv principles">
      <span>Clear numbers</span>
      <span>Better decisions</span>
      <span>Stronger growth</span>
    </div>
  </main>

  <a class="mail" href="mailto:contact@qantiv.com">contact@qantiv.com</a>
</body>
</html>
