<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Qantiv — Strategic finance advisory for ambitious businesses." />
  <title>Qantiv — Strategic Finance Advisory</title>

  <!-- Favicons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-black.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" href="/favicon-white.png" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --obsidian: #031719;
      --deep: #062f34;
      --deep-soft: #0a3b40;
      --cream: #f6efe3;
      --muted: rgba(246, 239, 227, 0.66);
      --subtle: rgba(246, 239, 227, 0.42);
      --line: rgba(246, 239, 227, 0.12);
      --line-soft: rgba(246, 239, 227, 0.075);
      --champagne: #bfa77a;
      --champagne-soft: rgba(191, 167, 122, 0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 30%, rgba(191, 167, 122, 0.12) 0%, rgba(191, 167, 122, 0.035) 30%, transparent 58%),
        radial-gradient(circle at 18% 88%, rgba(246, 239, 227, 0.055) 0%, transparent 36%),
        linear-gradient(145deg, var(--deep-soft) 0%, var(--deep) 38%, var(--obsidian) 100%);
      overflow-x: hidden;
      text-rendering: geometricPrecision;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(246, 239, 227, 0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(246, 239, 227, 0.018) 1px, transparent 1px);
      background-size: 84px 84px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 18px;
      border: 1px solid var(--line-soft);
      pointer-events: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 34px 42px;
      isolation: isolate;
    }

    .nav {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      color: var(--cream);
      text-decoration: none;
      letter-spacing: -0.03em;
      font-size: 1rem;
      font-weight: 650;
    }

    .brand img {
      width: 25px;
      height: 25px;
      object-fit: contain;
      opacity: 0.96;
    }

    .brand small {
      margin-left: 8px;
      padding-left: 12px;
      border-left: 1px solid var(--line);
      color: var(--subtle);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .lang {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 34px;
      border: 1px solid rgba(191, 167, 122, 0.32);
      border-radius: 999px;
      color: rgba(246, 239, 227, 0.76);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 650;
      letter-spacing: 0.12em;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .lang:hover {
      color: var(--cream);
      border-color: rgba(191, 167, 122, 0.64);
      background: rgba(246, 239, 227, 0.035);
    }

    main {
      position: relative;
      z-index: 2;
      flex: 1;
      width: min(1040px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 0 90px;
    }

    .hero {
      position: relative;
      width: 100%;
    }

    .watermark {
      position: absolute;
      left: 50%;
      top: 46%;
      width: min(620px, 72vw);
      transform: translate(-50%, -50%);
      opacity: 0.042;
      filter: blur(0.3px);
      pointer-events: none;
      user-select: none;
      z-index: -1;
    }

    .mark {
      width: clamp(104px, 12vw, 148px);
      height: auto;
      margin: 0 auto 38px;
      display: block;
      filter: drop-shadow(0 32px 58px rgba(0, 0, 0, 0.22));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 26px;
      color: var(--champagne);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--champagne-soft));
    }

    .eyebrow::after {
      background: linear-gradient(90deg, var(--champagne-soft), transparent);
    }

    h1 {
      max-width: 940px;
      margin: 0 auto;
      font-size: clamp(3.3rem, 7.6vw, 7.1rem);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 800;
    }

    .subline {
      max-width: 650px;
      margin: 34px auto 0;
      color: var(--muted);
      font-size: clamp(1.02rem, 1.7vw, 1.26rem);
      line-height: 1.78;
      font-weight: 320;
      letter-spacing: -0.017em;
    }

    .principles {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-top: 38px;
      color: rgba(246, 239, 227, 0.58);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .principles span:not(:last-child)::after {
      content: "";
      display: inline-block;
      width: 4px;
      height: 4px;
      margin-left: 18px;
      border-radius: 999px;
      background: rgba(191, 167, 122, 0.48);
      vertical-align: 0.12em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 48px;
      min-height: 46px;
      padding: 0 24px;
      border: 1px solid rgba(191, 167, 122, 0.36);
      border-radius: 999px;
      color: var(--cream);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 650;
      letter-spacing: 0.08em;
      background: rgba(246, 239, 227, 0.035);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.16);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      border-color: rgba(191, 167, 122, 0.7);
      background: rgba(246, 239, 227, 0.06);
    }

    .footer {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      color: rgba(246, 239, 227, 0.52);
      font-size: 0.72rem;
      font-weight: 550;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footer a {
      color: rgba(246, 239, 227, 0.7);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: var(--cream);
    }

    @media (max-width: 760px) {
      body::after { inset: 12px; }

      .page {
        padding: 24px 22px 26px;
      }

      .brand small {
        display: none;
      }

      main {
        padding: 66px 0 76px;
      }

      .mark {
        width: 112px;
        margin-bottom: 32px;
      }

      .eyebrow {
        gap: 13px;
        font-size: 0.62rem;
        letter-spacing: 0.24em;
      }

      .eyebrow::before,
      .eyebrow::after {
        width: 28px;
      }

      h1 {
        font-size: clamp(3.25rem, 18vw, 5.2rem);
      }

      .subline {
        max-width: 340px;
        margin-top: 30px;
        font-size: 1rem;
        line-height: 1.74;
      }

      .principles {
        max-width: 290px;
        margin: 34px auto 0;
        font-size: 0.62rem;
        line-height: 1.8;
        letter-spacing: 0.13em;
      }

      .principles span:not(:last-child)::after {
        margin-left: 14px;
      }

      .cta {
        margin-top: 42px;
        width: min(100%, 286px);
      }

      .footer {
        flex-direction: column;
        justify-content: center;
        text-align: center;
        gap: 10px;
        font-size: 0.62rem;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav" aria-label="Primary navigation">
      <a class="brand" href="/" aria-label="Qantiv home">
        <img src="qantiv_icon_white_transparent.png" alt="" aria-hidden="true" />
        <span>Qantiv</span>
        <small>Strategic finance</small>
      </a>
      <a class="lang" href="/fr/" aria-label="Switch to French">FR</a>
    </header>

    <main>
      <section class="hero" aria-label="Qantiv coming soon">
        <img class="watermark" src="qantiv_icon_white_transparent.png" alt="" aria-hidden="true" />
        <img class="mark" src="qantiv_icon_white_transparent.png" alt="Qantiv symbol" />

        <div class="eyebrow">Coming soon</div>

        <h1>Qantiv</h1>

        <p class="subline">
          Strategic finance advisory for ambitious businesses.
          Clear numbers, sharper decisions and controlled growth.
        </p>

        <div class="principles" aria-label="Qantiv principles">
          <span>Finance</span>
          <span>Decision</span>
          <span>Growth</span>
        </div>

        <a class="cta" href="mailto:contact@qantiv.com">contact@qantiv.com</a>
      </section>
    </main>

    <footer class="footer">
      <span>France · International · Remote</span>
      <a href="mailto:contact@qantiv.com">Private finance advisory</a>
    </footer>
  </div>
</body>
</html>
